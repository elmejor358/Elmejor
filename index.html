<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mía Li - Galaxia de Flores</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; }

        .hud {
            position: absolute; top: 7%; left: 50%; transform: translateX(-50%);
            text-align: center; pointer-events: none; z-index: 10; width: 90%;
        }
        .hud h1 {
            font-size: 2.1rem;
            color: #ffcc00;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255,204,0,0.7);
        }
        .hud p  {
            font-size: 0.82rem;
            color: #bbb;
            margin: 5px 0 0 0;
        }

        #verse-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #verse-overlay.visible { display: flex; }

        .verse-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }

        .verse-card {
            position: relative;
            max-width: 340px;
            width: 88%;
            background: linear-gradient(145deg, #1a1000, #2a1800);
            border: 1px solid rgba(255,204,0,0.35);
            border-radius: 20px;
            padding: 28px 24px 22px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255,180,0,0.25);
            animation: pop 0.35s ease;
        }

        @keyframes pop {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .verse-emoji { font-size: 2.6rem; margin-bottom: 12px; display: block; }
        .verse-text  { font-size: 1rem; color: #ffeaa0; line-height: 1.65; font-style: italic; margin: 0 0 14px; }
        .verse-ref   { font-size: 0.85rem; color: #ffcc00; font-weight: 600; letter-spacing: 1px; }

        .verse-close {
            margin-top: 20px;
            background: rgba(255,204,0,0.15);
            border: 1px solid rgba(255,204,0,0.4);
            color: #ffcc00;
            padding: 9px 28px;
            border-radius: 50px;
            font-size: 0.88rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="hud">
        <h1>Para Mía Li 🌻</h1>
        <p>Desliza para rotar · Pellizca para zoom · Toca una flor 🌻</p>
    </div>

    <div id="verse-overlay">
        <div class="verse-backdrop" onclick="closeVerse()"></div>
        <div class="verse-card">
            <span class="verse-emoji" id="vEmoji">🌻</span>
            <p class="verse-text" id="vText"></p>
            <div class="verse-ref" id="vRef"></div>
            <button class="verse-close" onclick="closeVerse()">Amén ✨</button>
        </div>
    </div>

    <canvas id="gc"></canvas>

<script>
'use strict';

// ─── Versículos ─────────────────────────────────────────────
const VERSES = [
    { text: "Porque de tal manera amó Dios al mundo...", ref: "Juan 3:16", emoji: "✝️" },
    { text: "El amor nunca deja de ser.", ref: "1 Corintios 13:8", emoji: "🌻" },
    { text: "Dios es amor.", ref: "1 Juan 4:8", emoji: "💛" },
    { text: "El que permanece en amor permanece en Dios.", ref: "1 Juan 4:16", emoji: "🌟" }
];

const overlay = document.getElementById('verse-overlay');
const vText = document.getElementById('vText');
const vRef = document.getElementById('vRef');
const vEmoji = document.getElementById('vEmoji');

let lastVerse = -1;

function showVerse() {
    let i;
    do { i = Math.floor(Math.random() * VERSES.length); } while (i === lastVerse);
    lastVerse = i;

    const v = VERSES[i];
    vText.textContent = `"${v.text}"`;
    vRef.textContent = v.ref;
    vEmoji.textContent = v.emoji;

    overlay.classList.add('visible');
}

function closeVerse() {
    overlay.classList.remove('visible');
}

// ─── Canvas Universo ─────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// partículas simples de universo 🌌
const stars = Array.from({ length: 500 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    z: Math.random() * 1
}));

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);

    for (let s of stars) {
        s.y += 0.2 + s.z;
        if (s.y > H) s.y = 0;

        ctx.fillStyle = "white";
        ctx.fillRect(s.x, s.y, 1 + s.z, 1 + s.z);
    }

    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
